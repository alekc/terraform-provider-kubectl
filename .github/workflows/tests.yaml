name: "tests"
on:
  pull_request:
    branches:
      - master
    # Skip the real kind / Terraform matrix on documentation-only PRs.
    # A companion ghost workflow at .github/workflows/tests-docs-skip.yaml
    # fires on the inverse path set and reports success on the same job
    # names, so branch protection (if ever configured to require these
    # checks) is still satisfied without burning runners on a Markdown
    # edit. Keep this list and the ghost's `paths:` list in lockstep.
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

# Lock GITHUB_TOKEN to the minimum scope every job in this workflow needs.
# All five jobs just check out the repo and run tests; none post comments,
# push commits, write packages, or otherwise mutate GitHub state. Setting
# `contents: read` here implicitly denies every other permission category
# (per GitHub's "set one, deny the rest" semantics), so a compromised
# step or action cannot escalate beyond reading the source tree.
permissions:
  contents: read

env:
  KUBECONFIG: ${{ github.workspace }}/.kube/config

jobs:
  get_version_matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6
      - id: get_version_matrix
        shell: bash
        run: |
          set -euo pipefail

          k8s_cycles="$(curl -sSfL https://endoflife.date/api/kubernetes.json | jq -rc '[sort_by(.releaseDate) | reverse | .[0:5] | .[].cycle]')"
          # The final `select($versions[.] != null)` drops cycles that
          # endoflife.date reports as current but for which kindest/node has
          # not yet published a matching tag (the typical case immediately
          # after a Kubernetes minor release). Without the filter the matrix
          # picks up a JSON null which renders as `kindest/node:v` and the
          # job fails with "manifest unknown".
          kind_versions="$(crane ls docker.io/kindest/node | jq -sRrc --argjson cycles "${k8s_cycles}" 'split("\n") | [.[] | match("^v((\\d+\\.\\d+)\\.\\d+)$").captures | {cycle: .[1].string, version: .[0].string}] | group_by(.cycle) | [.[] | .[-1] | {(.cycle): {"version": .version}}] | reduce .[] as $item ({}; . *= $item) | . as $versions | [$cycles | .[] | select($versions[.] != null) | $versions[.].version]')"
          terraform_versions="$(curl -sSfL https://endoflife.date/api/terraform.json | jq -rc '[sort_by(.releaseDate) | reverse | .[0:5] | .[].latest] + ["1.5.7"]')"
          # OpenTofu version list. No legacy pin equivalent to Terraform's
          # 1.5.7 because OpenTofu's first GA is 1.6.0 and there is no
          # MPL/BSL transition to commemorate.
          opentofu_versions="$(curl -sSfL https://endoflife.date/api/opentofu.json | jq -rc '[sort_by(.releaseDate) | reverse | .[0:5] | .[].latest]')"

          {
            echo "terraform_versions=${terraform_versions}"
            echo "opentofu_versions=${opentofu_versions}"
            echo "k8s_versions=${kind_versions}"
            # Index 0 of each version list is the most recent. The
            # per-engine smoke jobs consume these singletons; the
            # per-engine matrix jobs use the full lists and exclude the
            # smoke pair via the matrix's own `exclude:` block.
            echo "latest_terraform_version=$(echo "${terraform_versions}" | jq -rc '.[0]')"
            echo "latest_opentofu_version=$(echo "${opentofu_versions}" | jq -rc '.[0]')"
            echo "latest_k8s_version=$(echo "${kind_versions}" | jq -rc '.[0]')"
          } >> "${GITHUB_OUTPUT}"
    outputs:
      terraform_versions: ${{ steps.get_version_matrix.outputs.terraform_versions }}
      opentofu_versions: ${{ steps.get_version_matrix.outputs.opentofu_versions }}
      k8s_versions: ${{ steps.get_version_matrix.outputs.k8s_versions }}
      latest_terraform_version: ${{ steps.get_version_matrix.outputs.latest_terraform_version }}
      latest_opentofu_version: ${{ steps.get_version_matrix.outputs.latest_opentofu_version }}
      latest_k8s_version: ${{ steps.get_version_matrix.outputs.latest_k8s_version }}
  unit_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Unit tests
        env:
          GOPATH: /home/runner/go
        run: |
          make test
          make vet
  build_acc_test_binary:
    # Compile the framework acceptance-test binary once per CI run.
    # The four acc_test_* jobs download this artifact and execute it
    # directly via `./acc.test` instead of each invoking
    # `go test ./internal/framework`, which re-links the same binary
    # 50+ times across the matrix fan-out.
    #
    # As of the #62 cutover this binary compiles `./internal/framework`
    # (where the kubectl_manifest acc suite lives post-migration); the
    # `./kubernetes` package's remaining acc tests are the 5 SDK v2
    # data source manifest tests, scheduled to migrate with the data
    # source port. Until that lands they are not exercised by this
    # matrix; the smoke and real_*_smoke jobs above still cover the
    # critical mux + apply paths against a real CLI.
    #
    # Runs in the same first wave as get_version_matrix and unit_test
    # (no `needs:`), so it does not extend critical-path wall time.
    # Compile failures here surface before the matrix fans out,
    # short-circuiting wasted runner minutes on a known-bad source
    # tree.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Compile acceptance-test binary
        # `go test -c` builds the test binary without running it. The
        # resulting binary accepts standard testing flags with the
        # `-test.` prefix at run time (-test.v, -test.parallel=4,
        # -test.timeout=25m, -test.count=1).
        #
        # `-ldflags="-s -w"` strips the symbol table and DWARF debug
        # info, cutting the binary size by ~30%; the test framework
        # still produces full assertion messages and file:line panic
        # traces. `-trimpath` was tested and removed: it invalidates
        # the go-build cache (cache keys include the absolute build
        # paths it would strip) and added ~60 s to the first-wave
        # critical path. The strip flags do not invalidate the
        # cache and stand on their own.
        run: go test -c -ldflags="-s -w" -o acc.test ./internal/framework
      - name: Upload acceptance-test binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: acc-test-binary
          path: acc.test
          retention-days: 1
          if-no-files-found: error
  build_provider_binary:
    # Compile the provider binary once per CI run. real_terraform_smoke
    # and real_opentofu_smoke download this artifact and place it where
    # their dev_overrides block expects to find it. Centralising the
    # build collapses two parallel `go build` invocations (~30-60 s
    # each) into one; runs in the same first wave as the other build
    # jobs so it does not extend critical-path wall time.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Compile provider binary
        # `-ldflags="-s -w"`: same reasoning as build_acc_test_binary
        # (strip debug, no -trimpath because it invalidates the
        # go-build cache). The provider binary is CI-only and never
        # shipped to users.
        run: go build -ldflags="-s -w" -o terraform-provider-kubectl .
      - name: Upload provider binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provider-binary
          path: terraform-provider-kubectl
          retention-days: 1
          if-no-files-found: error
  real_terraform_smoke:
    # End-to-end smoke that drives a real Terraform CLI against a
    # dev_overrides build of the provider, applies a real manifest to a
    # real kind cluster, and tears it back down. Covers two regression
    # surfaces the SDK-test harness does not:
    #
    #   1. Provider load (GetProviderSchema): catches schema-parity
    #      regressions across the muxed providers — issue #275.
    #   2. Full create / read / delete lifecycle through the real CLI:
    #      catches anything that only manifests when the provider is
    #      driven over gRPC by `terraform` itself (plugin protocol
    #      versioning, mux server plumbing, signal handling, etc.).
    #
    # One Kubernetes × Terraform pair is enough — the matrix-wide
    # coverage already lives in acc_test_smoke / acc_test. This job is
    # about catching real-CLI-only regressions, not version drift.
    needs:
      - get_version_matrix
      - unit_test
      - build_provider_binary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download provider binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provider-binary
      - name: Install provider binary
        # dev_overrides below expects the binary at ${HOME}; move it
        # there and restore the executable bit (download-artifact
        # does not preserve it).
        run: |
          chmod +x terraform-provider-kubectl
          mv terraform-provider-kubectl "${HOME}/"
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 2m
          node_image: kindest/node:v${{ needs.get_version_matrix.outputs.latest_k8s_version }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ needs.get_version_matrix.outputs.latest_terraform_version }}
          terraform_wrapper: false
      - name: Configure dev_overrides
        run: |
          cat > "${HOME}/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "alekc/kubectl" = "${HOME}"
            }
            direct {}
          }
          EOF
      - name: Write smoke config
        run: |
          mkdir -p smoke
          cat > smoke/main.tf <<'EOF'
          terraform {
            required_providers {
              kubectl = {
                source = "alekc/kubectl"
              }
            }
          }

          # Reads kubeconfig via KUBE_CONFIG_PATH env var (defaulted to the
          # kind-action workspace path in this workflow). load_config_file
          # defaults to true.
          provider "kubectl" {}

          resource "kubectl_manifest" "smoke" {
            # `wait = true` makes the provider block on `terraform destroy`
            # until all finalizers (including the built-in `kubernetes`
            # finalizer that drains in-namespace resources) finish. Without
            # this, destroy returns while the namespace is still in
            # Terminating phase and the post-destroy `kubectl get` check
            # races against the kube-controller-manager.
            wait = true
            yaml_body = <<-YAML
              apiVersion: v1
              kind: Namespace
              metadata:
                name: kubectl-provider-real-smoke
            YAML
          }
          EOF
      - name: terraform apply
        # This is the real CLI driving the real provider binary through
        # gRPC. GetProviderSchema fires here; if mux parity is broken,
        # this step exits non-zero with the same diagnostic users see.
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: |
          cd smoke
          terraform apply -auto-approve
      - name: Verify namespace exists
        run: kubectl get namespace kubectl-provider-real-smoke
      - name: terraform destroy
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: |
          cd smoke
          terraform destroy -auto-approve
      - name: Verify namespace deleted
        run: |
          # `kubectl get` returns non-zero with a NotFound error once the
          # namespace is gone; treat that as success. Anything else (still
          # Terminating, still Active, transport error) fails the job.
          if kubectl get namespace kubectl-provider-real-smoke 2>&1 | grep -q 'NotFound'; then
            echo "namespace deleted as expected"
          else
            echo "namespace still present after terraform destroy" >&2
            kubectl get namespace kubectl-provider-real-smoke -o yaml >&2 || true
            exit 1
          fi
  real_opentofu_smoke:
    # Sibling of real_terraform_smoke for the OpenTofu CLI. Same shape: kind
    # cluster, dev_overrides build, real CLI apply/destroy on a namespace
    # manifest. Two reasons for a separate job rather than an engine matrix
    # on real_terraform_smoke:
    #
    #   1. Job names stay stable for branch protection. The existing
    #      `real_terraform_smoke` name keeps matching its required check;
    #      `real_opentofu_smoke` is the new contract.
    #   2. setup-terraform and setup-opentofu have different inputs
    #      (terraform_version / terraform_wrapper vs tofu_version /
    #      tofu_wrapper), and an engine-matrix + `if:` pattern would add
    #      noise without DRY savings; the rest of the job is ~15 lines.
    #
    # OpenTofu reads `~/.tofurc` first and falls back to `~/.terraformrc`.
    # We write the explicit `~/.tofurc` here so the provider_installation
    # block is the one OpenTofu prefers, not the compat-fallback path.
    needs:
      - get_version_matrix
      - unit_test
      - build_provider_binary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download provider binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provider-binary
      - name: Install provider binary
        # See real_terraform_smoke for why this is at ${HOME}.
        run: |
          chmod +x terraform-provider-kubectl
          mv terraform-provider-kubectl "${HOME}/"
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 2m
          node_image: kindest/node:v${{ needs.get_version_matrix.outputs.latest_k8s_version }}
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: ${{ needs.get_version_matrix.outputs.latest_opentofu_version }}
          tofu_wrapper: false
      - name: Configure dev_overrides
        run: |
          cat > "${HOME}/.tofurc" <<EOF
          provider_installation {
            dev_overrides {
              "alekc/kubectl" = "${HOME}"
            }
            direct {}
          }
          EOF
      - name: Write smoke config
        run: |
          mkdir -p smoke
          cat > smoke/main.tf <<'EOF'
          terraform {
            required_providers {
              kubectl = {
                source = "alekc/kubectl"
              }
            }
          }

          # Reads kubeconfig via KUBE_CONFIG_PATH env var (defaulted to the
          # kind-action workspace path in this workflow). load_config_file
          # defaults to true.
          provider "kubectl" {}

          resource "kubectl_manifest" "smoke" {
            # `wait = true` makes the provider block on `tofu destroy`
            # until all finalizers (including the built-in `kubernetes`
            # finalizer that drains in-namespace resources) finish. Without
            # this, destroy returns while the namespace is still in
            # Terminating phase and the post-destroy `kubectl get` check
            # races against the kube-controller-manager.
            wait = true
            yaml_body = <<-YAML
              apiVersion: v1
              kind: Namespace
              metadata:
                name: kubectl-provider-real-smoke
            YAML
          }
          EOF
      - name: tofu apply
        # OpenTofu driving the real provider binary through gRPC. Same
        # GetProviderSchema / mux-parity coverage as the Terraform smoke,
        # but exercised against the OpenTofu CLI's plugin-protocol
        # implementation.
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: |
          cd smoke
          tofu apply -auto-approve
      - name: Verify namespace exists
        run: kubectl get namespace kubectl-provider-real-smoke
      - name: tofu destroy
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: |
          cd smoke
          tofu destroy -auto-approve
      - name: Verify namespace deleted
        run: |
          # `kubectl get` returns non-zero with a NotFound error once the
          # namespace is gone; treat that as success. Anything else (still
          # Terminating, still Active, transport error) fails the job.
          if kubectl get namespace kubectl-provider-real-smoke 2>&1 | grep -q 'NotFound'; then
            echo "namespace deleted as expected"
          else
            echo "namespace still present after tofu destroy" >&2
            kubectl get namespace kubectl-provider-real-smoke -o yaml >&2 || true
            exit 1
          fi
  upgrade_path_smoke_terraform:
    # End-to-end smoke that exercises the upgrade path the matrix never
    # touches: install the last published provider from the real registry,
    # apply a representative manifest set, then swap to the just-built
    # binary via dev_overrides and assert `plan` is a no-op (state must
    # round-trip), `apply` is a no-op, an in-place update still works, and
    # destroy is clean. Catches schema-version bumps without migrators,
    # Read regressions, refresh crashes against state shapes the new
    # version doesn't understand, and plugin-startup breakage like #275
    # that pure clean-install smokes miss.
    #
    # Sibling upgrade_path_smoke_opentofu exercises the same scenario
    # through the OpenTofu CLI.
    needs:
      - get_version_matrix
      - unit_test
      - build_provider_binary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download provider binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provider-binary
      - name: Install provider binary
        # dev_overrides below expects the binary at ${HOME}; move it
        # there and restore the executable bit (download-artifact does
        # not preserve it).
        run: |
          chmod +x terraform-provider-kubectl
          mv terraform-provider-kubectl "${HOME}/"
      - name: Look up latest published provider version
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --json tagName --jq .tagName)
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest published: ${VERSION}"
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 2m
          node_image: kindest/node:v${{ needs.get_version_matrix.outputs.latest_k8s_version }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ needs.get_version_matrix.outputs.latest_terraform_version }}
          terraform_wrapper: false
      - name: Write upgrade-path config
        # Heredoc is quoted (<<'EOF') so bash does not expand HCL
        # interpolations (`${var.upgrade_label}`); GitHub Actions
        # expression substitution still runs first and replaces
        # `${{ steps.latest.outputs.version }}` with the actual version.
        # The `upgrade_label` variable defaults to "phase1" so Phase 1
        # writes labels.upgraded=phase1; Phase 2c passes
        # `-var upgrade_label=phase2` to drive an in-place update through
        # the just-built binary.
        run: |
          mkdir -p upgrade-smoke
          cat > upgrade-smoke/main.tf <<'EOF'
          terraform {
            required_providers {
              kubectl = {
                source  = "alekc/kubectl"
                version = "${{ steps.latest.outputs.version }}"
              }
            }
          }

          variable "upgrade_label" {
            type    = string
            default = "phase1"
          }

          provider "kubectl" {}

          resource "kubectl_manifest" "ns" {
            wait      = true
            yaml_body = <<-YAML
              apiVersion: v1
              kind: Namespace
              metadata:
                name: upgrade-smoke
                labels:
                  upgraded: "${var.upgrade_label}"
            YAML
          }

          resource "kubectl_manifest" "cm" {
            wait       = true
            depends_on = [kubectl_manifest.ns]
            yaml_body  = <<-YAML
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: upgrade-smoke-cm
                namespace: upgrade-smoke
              data:
                key: value
            YAML
          }

          resource "kubectl_manifest" "deploy" {
            wait_for_rollout = true
            wait             = true
            depends_on       = [kubectl_manifest.ns]
            yaml_body        = <<-YAML
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: upgrade-smoke-app
                namespace: upgrade-smoke
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: upgrade-smoke
                template:
                  metadata:
                    labels:
                      app: upgrade-smoke
                  spec:
                    containers:
                    - name: app
                      image: nginx:alpine
                      resources:
                        requests:
                          cpu: 10m
                          memory: 16Mi
                        limits:
                          memory: 64Mi
            YAML
          }
          EOF
      - name: Phase 1 - terraform init (registry install of published version)
        working-directory: upgrade-smoke
        run: terraform init
      - name: Phase 1 - terraform apply (against published provider)
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: terraform apply -auto-approve
      - name: Configure dev_overrides for built binary
        run: |
          cat > "${HOME}/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "alekc/kubectl" = "${HOME}"
            }
            direct {}
          }
          EOF
      - name: Phase 2a - terraform plan must be a no-op
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        # `-detailed-exitcode` returns 0 = no diff, 2 = diff, 1 = error.
        # A no-diff is the contract: state from the published version must
        # round-trip cleanly through the built binary's Read / refresh
        # path. On diff we dump the planned JSON for triage; the diff is
        # almost always in a single Sensitive attribute that the default
        # plan output hides, so the JSON is the only way to see it
        # without log-spelunking.
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -out=plan.bin
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "Phase 2a: plan is a no-op as required"
          elif [ $rc -eq 2 ]; then
            echo "Phase 2a FAIL: upgrade caused drift" >&2
            terraform show -no-color -json plan.bin | jq '.resource_changes[] | select(.change.actions[] | contains("update")) | {address, change: {before: .change.before, after: .change.after}}' >&2 || terraform show -no-color plan.bin >&2
            exit 1
          else
            exit $rc
          fi
      - name: Phase 2b - terraform apply must be a no-op
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: terraform apply -auto-approve
      - name: Phase 2c - in-place update via built binary
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        # Flip the Namespace label to verify the built binary's Update
        # path still works against state created by the published
        # version.
        run: |
          terraform apply -auto-approve -var upgrade_label=phase2
          ACTUAL=$(kubectl get namespace upgrade-smoke -o jsonpath='{.metadata.labels.upgraded}')
          if [ "$ACTUAL" != "phase2" ]; then
            echo "Phase 2c FAIL: expected label upgraded=phase2, got '$ACTUAL'" >&2
            exit 1
          fi
      - name: Phase 2d - terraform destroy
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: terraform destroy -auto-approve -var upgrade_label=phase2
      - name: Verify namespace deleted
        run: |
          if kubectl get namespace upgrade-smoke 2>&1 | grep -q 'NotFound'; then
            echo "namespace deleted as expected"
          else
            echo "namespace still present after terraform destroy" >&2
            kubectl get namespace upgrade-smoke -o yaml >&2 || true
            exit 1
          fi
  upgrade_path_smoke_opentofu:
    # OpenTofu sibling of upgrade_path_smoke_terraform. Identical scenario
    # exercised through the OpenTofu CLI: registry.opentofu.org install of
    # the last published version (alekc/kubectl is mirrored there), then
    # dev_overrides swap to the just-built binary and the same
    # plan-no-op / apply-no-op / mutate / destroy contract.
    #
    # Two separate jobs (not an engine matrix) for the same reasons
    # documented on real_opentofu_smoke: stable required-check names for
    # branch protection, and `setup-terraform` vs `setup-opentofu` having
    # different inputs (terraform_version / terraform_wrapper vs
    # tofu_version / tofu_wrapper).
    needs:
      - get_version_matrix
      - unit_test
      - build_provider_binary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download provider binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provider-binary
      - name: Install provider binary
        run: |
          chmod +x terraform-provider-kubectl
          mv terraform-provider-kubectl "${HOME}/"
      - name: Look up latest published provider version
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --json tagName --jq .tagName)
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest published: ${VERSION}"
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 2m
          node_image: kindest/node:v${{ needs.get_version_matrix.outputs.latest_k8s_version }}
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: ${{ needs.get_version_matrix.outputs.latest_opentofu_version }}
          tofu_wrapper: false
      - name: Write upgrade-path config
        # Identical main.tf to upgrade_path_smoke_terraform — the
        # kubectl_manifest config is CLI-agnostic. See that job's heredoc
        # comment for the quoting / variable-default rationale.
        run: |
          mkdir -p upgrade-smoke
          cat > upgrade-smoke/main.tf <<'EOF'
          terraform {
            required_providers {
              kubectl = {
                source  = "alekc/kubectl"
                version = "${{ steps.latest.outputs.version }}"
              }
            }
          }

          variable "upgrade_label" {
            type    = string
            default = "phase1"
          }

          provider "kubectl" {}

          resource "kubectl_manifest" "ns" {
            wait      = true
            yaml_body = <<-YAML
              apiVersion: v1
              kind: Namespace
              metadata:
                name: upgrade-smoke
                labels:
                  upgraded: "${var.upgrade_label}"
            YAML
          }

          resource "kubectl_manifest" "cm" {
            wait       = true
            depends_on = [kubectl_manifest.ns]
            yaml_body  = <<-YAML
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: upgrade-smoke-cm
                namespace: upgrade-smoke
              data:
                key: value
            YAML
          }

          resource "kubectl_manifest" "deploy" {
            wait_for_rollout = true
            wait             = true
            depends_on       = [kubectl_manifest.ns]
            yaml_body        = <<-YAML
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: upgrade-smoke-app
                namespace: upgrade-smoke
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: upgrade-smoke
                template:
                  metadata:
                    labels:
                      app: upgrade-smoke
                  spec:
                    containers:
                    - name: app
                      image: nginx:alpine
                      resources:
                        requests:
                          cpu: 10m
                          memory: 16Mi
                        limits:
                          memory: 64Mi
            YAML
          }
          EOF
      - name: Phase 1 - tofu init (registry install of published version)
        working-directory: upgrade-smoke
        run: tofu init
      - name: Phase 1 - tofu apply (against published provider)
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: tofu apply -auto-approve
      - name: Configure dev_overrides for built binary
        # OpenTofu reads ~/.tofurc first and falls back to ~/.terraformrc.
        # We write the explicit ~/.tofurc here so dev_overrides comes from
        # the preferred path, not the compat fallback.
        run: |
          cat > "${HOME}/.tofurc" <<EOF
          provider_installation {
            dev_overrides {
              "alekc/kubectl" = "${HOME}"
            }
            direct {}
          }
          EOF
      - name: Phase 2a - tofu plan must be a no-op
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: |
          set +e
          tofu plan -detailed-exitcode -no-color -out=plan.bin
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "Phase 2a: plan is a no-op as required"
          elif [ $rc -eq 2 ]; then
            echo "Phase 2a FAIL: upgrade caused drift" >&2
            echo "=== tofu show -json plan.bin ===" >&2
            tofu show -no-color -json plan.bin | jq '.resource_changes[] | select(.change.actions[] | contains("update")) | {address, change: {before: .change.before, after: .change.after}}' >&2 || tofu show -no-color plan.bin >&2
            exit 1
          else
            exit $rc
          fi
      - name: Phase 2b - tofu apply must be a no-op
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: tofu apply -auto-approve
      - name: Phase 2c - in-place update via built binary
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: |
          tofu apply -auto-approve -var upgrade_label=phase2
          ACTUAL=$(kubectl get namespace upgrade-smoke -o jsonpath='{.metadata.labels.upgraded}')
          if [ "$ACTUAL" != "phase2" ]; then
            echo "Phase 2c FAIL: expected label upgraded=phase2, got '$ACTUAL'" >&2
            exit 1
          fi
      - name: Phase 2d - tofu destroy
        working-directory: upgrade-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: tofu destroy -auto-approve -var upgrade_label=phase2
      - name: Verify namespace deleted
        run: |
          if kubectl get namespace upgrade-smoke 2>&1 | grep -q 'NotFound'; then
            echo "namespace deleted as expected"
          else
            echo "namespace still present after tofu destroy" >&2
            kubectl get namespace upgrade-smoke -o yaml >&2 || true
            exit 1
          fi
  cross_provider_upgrade_smoke_terraform:
    # Cross-provider state-move smoke (Phase A of the v3.0.0
    # framework-migration epic, issue #123 / milestone v3.0.0). Installs
    # the published gavinbunney/kubectl provider from the public
    # registry, applies a small manifest set, swaps `required_providers`
    # to alekc/kubectl (via dev_overrides pointing at the just-built
    # binary), and asserts `terraform plan` is a no-op so state
    # round-trips cleanly across the provider boundary.
    #
    # Terraform 1.8+ detects the cross-provider transition automatically
    # from the state's recorded provider FQN vs the new
    # required_providers entry, and invokes MoveStateResource on the
    # destination provider. No `moved {}` block is needed (and the
    # same-address shape that the README suggested earlier is in fact
    # rejected by the HCL validator as redundant).
    #
    # Now unconditional after #295's Phase D (cutover landed in #314):
    # the framework-side kubectl_manifest implements MoveStateResource,
    # so the plan-no-op assertion is the load-bearing check. The old
    # CROSS_PROVIDER_SMOKE_ENABLED repository-variable gate has been
    # removed.
    needs:
      - get_version_matrix
      - unit_test
      - build_provider_binary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download provider binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provider-binary
      - name: Install provider binary
        run: |
          chmod +x terraform-provider-kubectl
          mv terraform-provider-kubectl "${HOME}/"
      - name: Look up latest published gavinbunney version
        id: gb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo gavinbunney/terraform-provider-kubectl \
            --json tagName --jq .tagName)
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest published gavinbunney: ${VERSION}"
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 2m
          node_image: kindest/node:v${{ needs.get_version_matrix.outputs.latest_k8s_version }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ needs.get_version_matrix.outputs.latest_terraform_version }}
          terraform_wrapper: false
      - name: Phase 1 - write config pinned to gavinbunney
        # Quoted heredoc so bash leaves HCL alone; GitHub Actions still
        # substitutes the version pin.
        run: |
          mkdir -p cross-smoke
          cat > cross-smoke/main.tf <<'EOF'
          terraform {
            required_providers {
              kubectl = {
                source  = "gavinbunney/kubectl"
                version = "${{ steps.gb.outputs.version }}"
              }
            }
          }

          provider "kubectl" {}

          resource "kubectl_manifest" "ns" {
            wait      = true
            yaml_body = <<-YAML
              apiVersion: v1
              kind: Namespace
              metadata:
                name: cross-provider-smoke
            YAML
          }

          resource "kubectl_manifest" "cm" {
            wait       = true
            depends_on = [kubectl_manifest.ns]
            yaml_body  = <<-YAML
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: cross-provider-smoke-cm
                namespace: cross-provider-smoke
              data:
                phase: "1"
            YAML
          }
          EOF
      - name: Phase 1 - terraform init (registry install of gavinbunney)
        working-directory: cross-smoke
        run: terraform init
      - name: Phase 1 - terraform apply (against gavinbunney provider)
        working-directory: cross-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: terraform apply -auto-approve
      - name: Configure dev_overrides for built alekc binary
        run: |
          cat > "${HOME}/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "alekc/kubectl" = "${HOME}"
            }
            direct {}
          }
          EOF
      - name: Phase 2 - rewrite main.tf to use alekc with renamed addresses + moved blocks
        # Cross-provider state move with same-address moved blocks is
        # rejected by the HCL validator as redundant; Terraform doesn't
        # treat the provider FQN change in required_providers as a
        # distinguishing factor in moved-block validation. To get the
        # validator to accept the move and to give Terraform's
        # MoveStateResource trigger a different from/to to point at,
        # rename each resource block locally during migration:
        # kubectl_manifest.ns -> kubectl_manifest.ns_v3 and similarly for
        # cm. Users following the migration can rename back in a
        # subsequent apply once the state has moved.
        run: |
          cat > cross-smoke/main.tf <<'EOF'
          terraform {
            required_providers {
              kubectl = {
                source = "alekc/kubectl"
              }
            }
          }

          provider "kubectl" {}

          moved {
            from = kubectl_manifest.ns
            to   = kubectl_manifest.ns_v3
          }

          moved {
            from = kubectl_manifest.cm
            to   = kubectl_manifest.cm_v3
          }

          resource "kubectl_manifest" "ns_v3" {
            wait      = true
            yaml_body = <<-YAML
              apiVersion: v1
              kind: Namespace
              metadata:
                name: cross-provider-smoke
            YAML
          }

          resource "kubectl_manifest" "cm_v3" {
            wait       = true
            depends_on = [kubectl_manifest.ns_v3]
            yaml_body  = <<-YAML
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: cross-provider-smoke-cm
                namespace: cross-provider-smoke
              data:
                phase: "1"
            YAML
          }
          EOF
      - name: Phase 2 - terraform plan must be a no-op after the move
        working-directory: cross-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        # We cannot use `-detailed-exitcode` here: terraform treats
        # `moved {}` block annotations as a non-empty plan and returns
        # rc=2 even when the underlying `Plan: 0 to add, 0 to change,
        # 0 to destroy` summary confirms a clean state move. Capture
        # the plan output and assert that summary directly; the
        # downstream `terraform apply` step then commits the move and
        # the follow-up plan confirms idempotence with `-detailed-exitcode`.
        run: |
          set +e
          terraform plan -no-color | tee plan.out
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "Phase 2 FAIL: terraform plan errored (rc=$rc)" >&2
            exit "$rc"
          fi
          if ! grep -qE '^Plan: 0 to add, 0 to change, 0 to destroy\.' plan.out; then
            echo "Phase 2 FAIL: cross-provider move caused drift" >&2
            exit 1
          fi
          echo "Phase 2: plan is a no-op (moved-only) as required"
      - name: Phase 2 - terraform apply must be a no-op
        working-directory: cross-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: terraform apply -auto-approve
      - name: Phase 2 - second plan must be cleanly empty
        working-directory: cross-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        # After apply commits the rename, the state addresses match
        # the config addresses and the `moved` blocks become no-ops.
        # A second plan with `-detailed-exitcode` must return 0,
        # proving the cross-provider migration is fully absorbed and
        # routine future plans see no drift.
        run: terraform plan -detailed-exitcode -no-color
      - name: Verify resources survived the move
        run: |
          kubectl get namespace cross-provider-smoke
          kubectl get configmap -n cross-provider-smoke cross-provider-smoke-cm
      - name: Cleanup - terraform destroy
        if: always()
        working-directory: cross-smoke
        env:
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: terraform destroy -auto-approve || true
  framework_acc_test:
    # Runs the plugin-framework half's acceptance tests against a real kind
    # cluster with TF_ACC=1, producing genuine coverage for the
    # internal/framework package. Closes the measurement gap where
    # `unit_test` reports 0.0% coverage on internal/framework simply
    # because TF_ACC isn't set there (the package's tests all short-circuit
    # at testAccPreCheck without it).
    #
    # In-process via ProtoV6ProviderFactories using mux.MuxServer, so we
    # don't need a built provider binary or dev_overrides; the
    # terraform-plugin-testing harness reattaches the provider over the
    # framework's own gRPC channel.
    #
    # Single-cell rather than matrix-style. The framework code at this
    # point in the v3 migration is TF-version-agnostic (ephemeral resource
    # + small Phase-B kubectl_server_version surface). Phase D (which
    # moves kubectl_manifest to the framework side) may scale this to
    # matrix-style if the resource's plan-modifier behaviour proves
    # TF-version-sensitive. See issue #299.
    needs:
      - get_version_matrix
      - unit_test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          wait: 2m
          node_image: kindest/node:v${{ needs.get_version_matrix.outputs.latest_k8s_version }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ needs.get_version_matrix.outputs.latest_terraform_version }}
          terraform_wrapper: false
      - name: Run framework acceptance tests with coverage
        env:
          TF_ACC: "1"
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
        run: |
          go test ./internal/framework \
            -v -count=1 -timeout 12m \
            -coverprofile=framework-cover.txt \
            -covermode=atomic
      - name: Upload framework coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: framework-cover
          path: framework-cover.txt
          retention-days: 7
          if-no-files-found: warn
  acc_test_terraform_smoke:
    # Cheap-failure shield for the Terraform half of acc_test. Runs the
    # latest Kubernetes × latest Terraform cell first; the full Terraform
    # matrix only fans out after this is green. Decoupled from the
    # OpenTofu smoke so a tofu CI hiccup cannot block the Terraform
    # matrix (and vice versa).
    name: "acc_test smoke (terraform / k8s ${{ needs.get_version_matrix.outputs.latest_k8s_version }})"
    needs:
      - get_version_matrix
      - unit_test
      - build_acc_test_binary
    runs-on: ubuntu-latest
    # Hard cap so a wedged test (e.g. wait-for-condition pinned to an old
    # nginx image that never reaches Ready on a newer Kubernetes release)
    # can't burn the runner for hours. The `-test.timeout=25m` flag
    # passed to the precompiled binary is a few minutes lower so the
    # test framework gets a chance to surface goroutine stacks before
    # the runner is killed.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The acceptance-test binary downloaded below embeds the
          # compiled test code; the only repo content this job needs
          # at runtime is the example .tf files under `_examples/`
          # (the tests reference them via `../../_examples/` from
          # working-directory: internal/framework). Sparse checkout in cone
          # mode keeps the top-level files plus the named cone, so
          # the rest of the source tree is skipped.
          sparse-checkout: |
            _examples
      - name: Download acceptance-test binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: acc-test-binary
      - name: Make binary executable
        # download-artifact does not preserve the executable bit on the
        # uploaded file; restore it before running.
        run: chmod +x acc.test
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        id: kind
        with:
          wait: 2m
          node_image: kindest/node:v${{ needs.get_version_matrix.outputs.latest_k8s_version }}
      # Install Terraform up-front and hand its absolute path to the test
      # framework via TF_ACC_TERRAFORM_PATH. Without this, the
      # terraform-plugin-testing helper installs Terraform into a per-test
      # temp dir and chmod-then-exec races under -parallel, producing
      # `fork/exec /tmp/plugintest-terraform.../terraform: text file busy`.
      # `terraform_wrapper: false` is required so the binary on PATH is the
      # real Terraform, not the wrapping script setup-terraform installs by
      # default.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ needs.get_version_matrix.outputs.latest_terraform_version }}
          terraform_wrapper: false
      - name: Locate Terraform binary
        id: tfpath
        run: echo "path=$(which terraform)" >> "${GITHUB_OUTPUT}"
      - name: Prepare runtime directory
        # Sparse checkout (above) did not materialize internal/framework/;
        # create an empty placeholder so `working-directory:
        # internal/framework` resolves and the test binary's references to
        # `../../_examples/` reach the cone we did check out.
        run: mkdir -p internal/framework
      - name: Acceptance Tests
        # `working-directory: internal/framework` so the tests resolve
        # ../../_examples/ correctly (same effective cwd that
        # `go test ./internal/framework` provides).
        # `-test.parallel=4`: tests that opt in via `t.Parallel()` run
        # up to 4 at a time; tests without it still run serially. A
        # bump to 8 was tested and reverted -- one of every ~50 cells
        # tripped `TestAccKubectlDataSourceManifest_arrayIndex` on a
        # `client rate limiter Wait returned an error: context
        # deadline exceeded` failure, caused by k8s client-go's
        # default QPS=5 / burst=10 limiter saturating under doubled
        # concurrency. A 2% flake rate is not acceptable for CI; if
        # the provider ever raises its client QPS we can revisit.
        # No `-race`: the SDK v2 harness shares a *schema.Provider
        # across parallel tests and races inside
        # `GRPCProviderServer.ConfigureProvider`.
        working-directory: internal/framework
        env:
          TF_ACC: "1"
          KUBE_CONFIG_PATH: ${{ env.KUBECONFIG }}
          TF_ACC_TERRAFORM_PATH: ${{ steps.tfpath.outputs.path }}
          TF_ACC_TERRAFORM_VERSION: ${{ needs.get_version_matrix.outputs.latest_terraform_version }}
        run: ../../acc.test -test.v -test.parallel=4 -test.timeout=25m -test.count=1
  acc_test_opentofu_smoke:
    # OpenTofu sibling of acc_test_terraform_smoke. Same shape, swapped
    # setup action. terraform-plugin-testing execs whatever binary sits
    # at TF_ACC_TERRAFORM_PATH, so `tofu` works the same as `terraform`
    # for the harness; only the setup-* action differs.
    name: "acc_test smoke (opentofu / k8s ${{ needs.get_version_matrix.outputs.latest_k8s_version }})"
    needs:
      - get_version_matrix
      - unit_test
      - build_acc_test_binary
